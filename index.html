<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Fusion Learning Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #08152a;
    --navy:       #0d1f3c;
    --navy-mid:   #0f2244;
    --navy-card:  #132848;
    --navy-raise: #1a3158;
    --navy-light: #1e3d6e;
    --sky:        #4da6e8;
    --sky-light:  #7dc2f4;
    --sky-pale:   rgba(77,166,232,0.12);
    --white:      #ffffff;
    --text:       #cde3f8;
    --text-muted: #6a90b8;
    --border:     rgba(77,166,232,0.15);
    --border-mid: rgba(77,166,232,0.25);
    --shadow:     0 4px 32px rgba(4,10,22,0.55);
    --radius:     12px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);

    /* HCM accent = sky (existing) */
    --hcm:        #4da6e8;
    --hcm-pale:   rgba(77,166,232,0.12);
    --hcm-label:  #7dc2f4;

    /* ERP accent = teal/green */
    --erp:        #34c9a0;
    --erp-pale:   rgba(52,201,160,0.11);
    --erp-label:  #5fddb9;
    --erp-border: rgba(52,201,160,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP NAV ── */
  header {
    background: var(--navy);
    border-bottom: 1px solid var(--border-mid);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 0 32px;
    height: 64px;
    display: flex; align-items: center; gap: 16px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--sky) 0%, var(--sky-light) 100%);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 20px; height: 20px; fill: var(--white); }
  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem; color: var(--white); letter-spacing: 0.01em;
  }
  .logo-text span { color: var(--sky-light); }
  .header-badge {
    margin-left: auto;
    background: rgba(77,166,232,0.15);
    border: 1px solid rgba(77,166,232,0.3);
    color: var(--sky-light);
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 20px;
  }

  /* ── BREADCRUMB ── */
  .breadcrumb-bar {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
  }
  .breadcrumb-inner {
    max-width: 1280px; margin: 0 auto;
    height: 44px; display: flex; align-items: center; gap: 6px;
  }
  .bc-item { font-size: 0.8rem; color: var(--text-muted); cursor: pointer; transition: color var(--transition); white-space: nowrap; }
  .bc-item:hover { color: var(--sky-light); }
  .bc-item.active { color: var(--sky-light); font-weight: 500; pointer-events: none; }
  .bc-sep { color: rgba(138,172,204,0.4); font-size: 0.75rem; }

  /* ── MAIN LAYOUT ── */
  main { max-width: 1280px; margin: 0 auto; padding: 40px 32px 80px; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 28px; }
  .page-header .eyebrow {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--sky); margin-bottom: 8px;
  }
  .page-header h1 {
    font-family: 'DM Serif Display', serif; font-size: 2.1rem; color: var(--white); line-height: 1.2;
  }
  .page-header p { margin-top: 10px; font-size: 0.95rem; color: var(--text-muted); max-width: 540px; line-height: 1.6; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-right: 4px; }
  .filter-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;
    border: 1.5px solid transparent; transition: all var(--transition);
    background: var(--navy-card); color: var(--text-muted);
    border-color: var(--border);
  }
  .filter-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .filter-btn:hover { color: var(--white); border-color: var(--border-mid); background: var(--navy-raise); }
  .filter-btn.active-all { background: rgba(77,166,232,0.15); border-color: var(--sky); color: var(--sky-light); }
  .filter-btn.active-hcm { background: var(--hcm-pale); border-color: var(--hcm); color: var(--hcm-label); }
  .filter-btn.active-erp { background: var(--erp-pale); border-color: var(--erp); color: var(--erp-label); }
  .filter-count { font-size: 0.68rem; background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 10px; font-weight: 700; }

  /* ── SECTION LABEL ── */
  .section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }

  /* ── MODULE GRID ── */
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px; margin-bottom: 48px;
  }
  .module-card {
    background: var(--navy-card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px 20px;
    cursor: pointer;
    transition: all var(--transition);
    position: relative; overflow: hidden;
    box-shadow: 0 2px 12px rgba(4,10,22,0.3);
  }
  .module-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    opacity: 0; transition: opacity var(--transition);
  }
  .module-card.hcm-card::before { background: linear-gradient(90deg, var(--sky), var(--sky-light)); }
  .module-card.erp-card::before { background: linear-gradient(90deg, var(--erp), var(--erp-label)); }

  .module-card:hover { background: var(--navy-raise); transform: translateY(-2px); }
  .module-card.hcm-card:hover { border-color: var(--sky); box-shadow: 0 6px 28px rgba(77,166,232,0.15); }
  .module-card.erp-card:hover { border-color: var(--erp); box-shadow: 0 6px 28px rgba(52,201,160,0.13); }
  .module-card:hover::before { opacity: 1; }
  .module-card.selected { background: var(--navy-raise); }
  .module-card.hcm-card.selected { border-color: var(--sky); box-shadow: 0 6px 28px rgba(77,166,232,0.18); }
  .module-card.erp-card.selected { border-color: var(--erp); box-shadow: 0 6px 28px rgba(52,201,160,0.16); }
  .module-card.selected::before { opacity: 1; }

  .module-card.hidden { display: none; }

  /* type badge on card */
  .type-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 10px;
    margin-bottom: 10px;
  }
  .type-badge .dot { width: 5px; height: 5px; border-radius: 50%; }
  .hcm-badge { background: var(--hcm-pale); color: var(--hcm-label); border: 1px solid rgba(77,166,232,0.25); }
  .hcm-badge .dot { background: var(--sky); }
  .erp-badge { background: var(--erp-pale); color: var(--erp-label); border: 1px solid var(--erp-border); }
  .erp-badge .dot { background: var(--erp); }

  .module-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
  }
  .hcm-card .module-icon { background: var(--hcm-pale); }
  .erp-card .module-icon { background: var(--erp-pale); }
  .hcm-card .module-icon svg { width: 22px; height: 22px; stroke: var(--sky); fill: none; stroke-width: 1.7; }
  .erp-card .module-icon svg { width: 22px; height: 22px; stroke: var(--erp); fill: none; stroke-width: 1.7; }

  .module-card h3 { font-size: 0.92rem; font-weight: 600; color: var(--white); margin-bottom: 5px; }
  .module-card p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
  .module-count {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 12px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
  }
  .hcm-card .module-count { color: var(--sky); }
  .erp-card .module-count { color: var(--erp-label); }

  /* ── SUBPROCESS PANEL ── */
  .subprocess-panel {
    background: var(--navy-card); border: 1px solid var(--border-mid);
    border-radius: 16px; padding: 28px 28px 32px;
    margin-bottom: 32px; box-shadow: var(--shadow);
    display: none; animation: slideIn 0.28s cubic-bezier(.4,0,.2,1);
  }
  .subprocess-panel.visible { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .panel-icon {
    width: 48px; height: 48px; background: var(--navy-raise);
    border: 1px solid var(--border-mid); border-radius: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .panel-icon svg { width: 24px; height: 24px; fill: none; stroke-width: 1.7; }
  .panel-icon.hcm-icon svg { stroke: var(--sky-light); }
  .panel-icon.erp-icon svg { stroke: var(--erp-label); }
  .panel-header-text h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--white); }
  .panel-header-text p { font-size: 0.82rem; color: var(--text-muted); margin-top: 3px; }
  .close-btn {
    margin-left: auto; width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all var(--transition); flex-shrink: 0;
  }
  .close-btn:hover { background: var(--sky-pale); color: var(--sky-light); border-color: var(--sky); }

  .subprocess-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px;
  }
  .subprocess-card {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 16px 18px;
    cursor: pointer; transition: all var(--transition); background: var(--navy-raise);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .subprocess-card:hover, .subprocess-card.selected {
    border-color: var(--sky); background: var(--navy-light); box-shadow: 0 3px 16px rgba(77,166,232,0.12);
  }
  .subprocess-bullet {
    width: 28px; height: 28px; border-radius: 7px; background: var(--sky-pale); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .subprocess-bullet svg { width: 14px; height: 14px; stroke: var(--sky); fill: none; stroke-width: 2; }
  .subprocess-card h4 { font-size: 0.85rem; font-weight: 600; color: var(--white); margin-bottom: 3px; }
  .subprocess-card span { font-size: 0.75rem; color: var(--text-muted); }

  /* ── PROCESS DRAWER ── */
  .process-drawer {
    background: var(--bg); border: 1px solid var(--border-mid); border-radius: 16px;
    padding: 28px 28px 32px; margin-top: -4px;
    display: none; animation: slideIn 0.25s cubic-bezier(.4,0,.2,1);
  }
  .process-drawer.visible { display: block; }
  .drawer-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .drawer-header h3 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--white); }
  .drawer-header .sub-label { font-size: 0.75rem; color: var(--sky-light); margin-left: auto; }

  .process-list { display: flex; flex-direction: column; gap: 8px; }
  .process-item {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(77,166,232,0.2);
    border-radius: 8px; padding: 13px 16px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; transition: all var(--transition); cursor: pointer; position: relative;
  }
  .process-item:hover { background: rgba(77,166,232,0.12); border-color: var(--sky); transform: translateX(4px); }
  .process-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(77,166,232,0.2); border: 1px solid rgba(77,166,232,0.35);
    font-size: 0.7rem; font-weight: 700; color: var(--sky-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .process-text { flex: 1; }
  .process-text strong { display: block; font-size: 0.85rem; font-weight: 500; color: var(--white); margin-bottom: 2px; }
  .process-text em { font-style: normal; font-size: 0.73rem; color: var(--sky-light); }
  .process-link-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(77,166,232,0.15); border: 1px solid rgba(77,166,232,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all var(--transition);
  }
  .process-item:hover .process-link-icon { background: var(--sky); border-color: var(--sky); }
  .process-link-icon svg { width: 13px; height: 13px; stroke: var(--sky-light); fill: none; stroke-width: 2.2; }
  .process-item:hover .process-link-icon svg { stroke: var(--white); }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 0.88rem; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border); padding: 20px 32px;
    text-align: center; font-size: 0.75rem; color: var(--text-muted); background: var(--navy);
  }
</style>
</head>

<header>

  <div class="section-label" id="sectionLabel">MODULES</div>

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedModule     = null;
let selectedSubprocess = null;
let activeFilter       = 'all';

// ── COUNTS ───────────────────────────────────────────────────────────────────
function updateCounts() {
  const all = modules.length;
  const hcm = modules.filter(m => m.type === 'hcm').length;
  const erp = modules.filter(m => m.type === 'erp').length;
  document.getElementById('count-all').textContent = all;
  document.getElementById('count-hcm').textContent = hcm;
  document.getElementById('count-erp').textContent = erp;
}

// ── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  ['all','hcm','erp'].forEach(k => {
    const btn = document.getElementById('btn-' + k);
    btn.className = 'filter-btn' + (k === f ? ' active-' + k : '');
  });
  goHome();
  renderModules();
}

// ── RENDER MODULES ───────────────────────────────────────────────────────────
function renderModules() {
  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = modules.map(m => {
    const total   = m.subprocesses.reduce((a, s) => a + s.processes.length, 0);
    const hidden  = activeFilter !== 'all' && m.type !== activeFilter;
    const typeClass = m.type === 'hcm' ? 'hcm-card' : 'erp-card';
    const badgeClass = m.type === 'hcm' ? 'hcm-badge' : 'erp-badge';
    const badgeLabel = m.type === 'hcm' ? 'HCM' : 'ERP';
    return `
      <div class="module-card ${typeClass} ${selectedModule === m.id ? 'selected' : ''} ${hidden ? 'hidden' : ''}"
           onclick="selectModule('${m.id}')">
        <div class="type-badge ${badgeClass}"><span class="dot"></span>${badgeLabel}</div>
        <div class="module-icon">${m.icon}</div>
        <h3>${m.name}</h3>
        <p>${m.desc}</p>
        <div class="module-count">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          ${m.subprocesses.length} areas &nbsp;·&nbsp; ${total} processes
        </div>
      </div>`;
  }).join('');
}

// ── SELECT MODULE ────────────────────────────────────────────────────────────
function selectModule(id) {
  selectedModule     = id;
  selectedSubprocess = null;
  const mod = modules.find(m => m.id === id);
  const iconClass = mod.type === 'hcm' ? 'hcm-icon' : 'erp-icon';

  updateBreadcrumb([
    { label: 'All Modules', action: 'goHome()' },
    { label: mod.name, active: true }
  ]);

  const panel  = document.getElementById('subprocessPanel');
  const header = document.getElementById('panelHeader');
  header.innerHTML = `
    <div class="panel-icon ${iconClass}">${mod.icon}</div>
    <div class="panel-header-text">
      <h2>${mod.name}</h2>
      <p>Select a subprocess area to view its guided processes</p>
    </div>
    <button class="close-btn" onclick="goHome()" title="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>`;

  const list = document.getElementById('subprocessList');
  list.innerHTML = mod.subprocesses.map(s => `
    <div class="subprocess-card ${selectedSubprocess === s.id ? 'selected' : ''}"
         onclick="selectSubprocess('${mod.id}', '${s.id}')">
      <div class="subprocess-bullet">${s.icon}</div>
      <div>
        <h4>${s.name}</h4>
        <span>${s.desc}</span>
      </div>
    </div>`).join('');

  panel.classList.add('visible');
  document.getElementById('processDrawer').classList.remove('visible');
  renderModules();
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// ── SELECT SUBPROCESS ────────────────────────────────────────────────────────
function selectSubprocess(modId, subId) {
  selectedSubprocess = subId;
  const mod = modules.find(m => m.id === modId);
  const sub = mod.subprocesses.find(s => s.id === subId);

  updateBreadcrumb([
    { label: 'All Modules', action: 'goHome()' },
    { label: mod.name, action: `selectModule('${modId}')` },
    { label: sub.name, active: true }
  ]);

  document.querySelectorAll('.subprocess-card').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  const drawer = document.getElementById('processDrawer');
  document.getElementById('drawerHeader').innerHTML = `
    <div class="subprocess-bullet" style="background:rgba(77,166,232,0.15);border-radius:8px;width:32px;height:32px;">${sub.icon}</div>
    <h3>${sub.name}</h3>
    <span class="sub-label">${sub.processes.length} processes</span>`;

  document.getElementById('processList').innerHTML = sub.processes.map((p, i) => `
    <a class="process-item" href="${p.url}" target="_blank" rel="noopener">
      <div class="process-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="process-text">
        <strong>${p.name}</strong>
        <em>${p.hint}</em>
      </div>
      <div class="process-link-icon">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </div>
    </a>`).join('');

  drawer.classList.add('visible');
  setTimeout(() => drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// ── GO HOME ──────────────────────────────────────────────────────────────────
function goHome() {
  selectedModule     = null;
  selectedSubprocess = null;
  document.getElementById('subprocessPanel').classList.remove('visible');
  document.getElementById('processDrawer').classList.remove('visible');
  updateBreadcrumb([{ label: 'All Modules', active: true }]);
  renderModules();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── BREADCRUMB ───────────────────────────────────────────────────────────────
function updateBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = items.map((item, i) => {
    const sep = i < items.length - 1 ? `<span class="bc-sep">›</span>` : '';
    if (item.active) return `<span class="bc-item active">${item.label}</span>${sep}`;
    return `<span class="bc-item" onclick="${item.action}">${item.label}</span>${sep}`;
  }).join('');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
updateCounts();
renderModules();
</script>
