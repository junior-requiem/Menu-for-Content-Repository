<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu for Content Repository</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main { max-width: 48rem; text-align: center; }
      h1 { margin-bottom: 0.5rem; }
      p { line-height: 1.6; }
      code {
        background: color-mix(in oklab, canvastext 12%, canvas 88%);
        padding: 0.15rem 0.4rem;
        border-radius: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub Pages is working ✅</h1>
      <p>
        This repository now includes an <code>index.html</code> file so GitHub Pages has a
        default page to serve.
      </p>
      <p>
        If your Pages URL was returning 404 before, wait 1–2 minutes after pushing this commit
        and then refresh.
      </p>
    </main>
  </body>
</html>
